name: Bug report
description: Report a reproducible problem in Novel Studio AI.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste API keys, `.env.local`, SQLite database files, or private manuscript text.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact UI/API steps.
      placeholder: |
        1. Create a project
        2. Generate Story Bible
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: "Node 22, macOS 15, npm 10"
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Redact secrets and private manuscript content before sharing logs or screenshots.
